<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Hollanda market zincirlerinin haftalık indirimli ürünlerini keşfedin. Albert Heijn, Lidl, Jumbo, Aldi ve daha fazlası." />
    <meta name="theme-color" content="#E33D26" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DEALHUNTER" />
    <!-- Open Graph -->
    <meta property="og:title" content="DEALHUNTER — Haftalık Market İndirimleri" />
    <meta property="og:description" content="Hollanda market zincirlerinin haftalık indirimli ürünlerini keşfedin." />
    <meta property="og:image" content="/icon-512x512.png" />
    <meta property="og:type" content="website" />
    <title>DEALHUNTER — Haftalık Market İndirimleri</title>
    <!-- Google Fonts: Space Grotesk + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => {
              console.log('✅ Service Worker registered:', reg.scope);
              // Check for updates every 60 minutes
              setInterval(() => reg.update(), 60 * 60 * 1000);
            })
            .catch((err) => console.error('❌ SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
