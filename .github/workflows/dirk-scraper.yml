name: Dirk Scraper

on:
  schedule:
    # Pazartesi 08:30 UTC (Railway scraper 08:00 bittikten sonra)
    - cron: '30 8 * * 1'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  scrape-dirk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Dirk scraper
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: node .github/scripts/dirk-scraper.js
