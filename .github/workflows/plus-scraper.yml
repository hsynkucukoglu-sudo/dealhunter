name: Plus Scraper

on:
  schedule:
    # Elke dag 09:00 UTC (Railway scraper 08:00 bittikten 1 saat sonra — Railway'in üzerine yazar)
    - cron: '0 9 * * *'
  workflow_dispatch: # Manuel tetikleme için

jobs:
  scrape-plus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Plus scraper
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: node .github/scripts/plus-scraper.js
