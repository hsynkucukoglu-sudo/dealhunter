name: Kruidvat Scraper

on:
  schedule:
    # Pazartesi 08:15 UTC (Railway scraper 08:00'den sonra)
    - cron: '15 8 * * 1'
  workflow_dispatch:

jobs:
  scrape-kruidvat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Kruidvat scraper
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: node .github/scripts/kruidvat-scraper.js
