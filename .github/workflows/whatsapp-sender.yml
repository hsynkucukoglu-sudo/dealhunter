name: WhatsApp Deal Sender

on:
  schedule:
    # Times in UTC — Netherlands is CEST (UTC+2) in summer, CET (UTC+1) in winter
    # Supermarkt producten (5x)
    - cron: '0 6 * * *'   # 08:00 CEST — product
    - cron: '0 8 * * *'   # 10:00 CEST — product
    - cron: '0 11 * * *'  # 13:00 CEST — product
    - cron: '0 15 * * *'  # 17:00 CEST — product
    - cron: '0 18 * * *'  # 20:00 CEST — product
    # Affiliate promoties (3x)
    - cron: '0 7 * * *'   # 09:00 CEST — affiliate
    - cron: '0 10 * * *'  # 12:00 CEST — affiliate
    - cron: '0 13 * * *'  # 15:00 CEST — affiliate
  workflow_dispatch:       # manual trigger for testing

jobs:
  send-deal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Send WhatsApp deal
        env:
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID:      ${{ secrets.WHATSAPP_GROUP_ID }}
        run: node scripts/whatsapp-sender.mjs
