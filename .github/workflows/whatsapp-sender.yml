name: WhatsApp Deal Sender

on:
  schedule:
    # Times in UTC — Netherlands is CEST (UTC+2) in summer, CET (UTC+1) in winter
    # Supermarkt producten (5x)
    - cron: '7 6 * * *'   # 08:07 CEST — product
    - cron: '7 8 * * *'   # 10:07 CEST — product
    - cron: '7 11 * * *'  # 13:07 CEST — product
    - cron: '7 15 * * *'  # 17:07 CEST — product
    - cron: '7 18 * * *'  # 20:07 CEST — product
    # Affiliate promoties (3x)
    - cron: '7 7 * * *'   # 09:07 CEST — affiliate
    - cron: '7 10 * * *'  # 12:07 CEST — affiliate
    - cron: '7 13 * * *'  # 15:07 CEST — affiliate
  workflow_dispatch:       # manual trigger for testing

jobs:
  send-deal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Send WhatsApp deal
        env:
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN:        ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID:      ${{ secrets.WHATSAPP_GROUP_ID }}
        run: node scripts/whatsapp-sender.mjs
