[build]
builder = "NIXPACKS"
buildCommand = "cd backend && npm install && cd ../frontend-next && npm install --include=dev && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public"

[deploy]
startCommand = "sh -c 'HOSTNAME=localhost PORT=3000 node frontend-next/.next/standalone/server.js & NODE_ENV=production NEXT_PORT=3000 exec node backend/server.js'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
